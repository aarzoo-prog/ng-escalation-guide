<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NavGurukul — Escalation Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --surface: #FDFAF4;
    --border: #DDD5C5;
    --text: #1A1610;
    --muted: #8A7F6E;
    --accent: #C04A2C;
    --accent-light: #F5E8E4;
    --green: #2C6E4A;
    --green-light: #E4F0E9;
    --blue: #2B4C8C;
    --blue-light: #E6EBF5;
    --user-bg: #2B4C8C;
    --user-text: #FDFAF4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 720px;
    padding: 32px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .org-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .divider {
    width: 100%;
    max-width: 720px;
    height: 1px;
    background: var(--border);
    margin: 20px 0 0;
  }

  .chat-container {
    width: 100%;
    max-width: 720px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 24px;
  }

  .messages {
    flex: 1;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 300px;
    max-height: 520px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    margin-top: 2px;
  }

  .avatar.bot {
    background: var(--accent);
    color: white;
    font-family: 'Fraunces', serif;
    font-style: italic;
  }

  .avatar.user {
    background: var(--blue);
    color: white;
  }

  .bubble {
    max-width: 82%;
    padding: 13px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
  }

  .message.bot .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-top-right-radius: 4px;
  }

  .bubble strong {
    font-weight: 500;
  }

  .bubble .level-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    margin-right: 6px;
    vertical-align: middle;
  }

  .level-tag.urgent { background: #FEE2E2; color: #991B1B; }
  .level-tag.normal { background: var(--blue-light); color: var(--blue); }
  .level-tag.pnc { background: var(--green-light); color: var(--green); }

  .contact-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 13px;
    margin-top: 10px;
    font-size: 13px;
  }

  .contact-card .name { font-weight: 500; color: var(--text); }
  .contact-card .role { color: var(--muted); font-size: 12px; margin-top: 1px; }
  .contact-card .email { color: var(--accent); font-size: 12px; margin-top: 4px; }

  .typing {
    display: flex;
    gap: 12px;
    align-items: center;
    opacity: 0.7;
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 13px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .input-area {
    padding: 16px 0 28px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 15px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-color: var(--blue); }

  button#send {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }

  button#send:hover { background: #A83C22; }
  button#send:active { transform: scale(0.96); }
  button#send:disabled { background: var(--border); cursor: default; }

  button#send svg { width: 18px; height: 18px; fill: white; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .chip {
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    background: var(--blue-light);
    border-color: var(--blue);
    color: var(--blue);
  }
</style>
</head>

ESCALATION LEVELS

- Level 1 – Team Resolution: Talk directly to the peer or person involved. Try within 3–5 working days. Not a formal escalation — just a healthy first step.
- Level 2 – Direct Manager: Raise it in a 1:1 or scheduled catch-up. Acknowledge: 2 days. Resolve: 7 working days from acknowledgement. Copy PnC if behavioral.
- Level 3 – Skip Manager: If unresolved, or if your manager is the subject. Go async first (email/Slack). Acknowledge: 2 days. Resolve: 10 working days. Copy PnC on behavioral/cultural issues.
- Level 4 – People & Culture (PnC): For behavioral, interpersonal, cultural, or sensitive concerns. Email: people@navgurukul.org. Acknowledge: 1 day. Resolve: 7 days. Confidential.
- Level 5 – CEO/Directors: Final escalation. Email only to Abhishek Gupta: abhishek@navgurukul.org. Include prior steps taken.

FAST-TRACK — bypass all levels, act immediately:

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

let history = [];

const STARTER_CHIPS = [
  "My manager isn't listening to me",
  "I'm being treated unfairly",
  "There's a conflict in my team",
  "I don't know who to escalate to",
  "Something happened that made me feel unsafe"
];

function renderChips() {
  const div = document.createElement('div');
  div.className = 'chips';
  div.id = 'starter-chips';
  STARTER_CHIPS.forEach(text => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = text;
    chip.onclick = () => {
      inputEl.value = text;
      div.remove();
      sendMessage();
    };
    div.appendChild(chip);
  });
  messagesEl.appendChild(div);
}

function addMessage(role, html) {
  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? 'N' : 'Y';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'typing';
  msg.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = 'N';

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';

  msg.appendChild(avatar);
  msg.appendChild(dots);
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function formatResponse(text) {
  // Bold **text**
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Line breaks
  text = text.replace(/\n\n/g, '<br><br>');
  text = text.replace(/\n/g, '<br>');
  // Email links
  text = text.replace(/([a-zA-Z0-9._%+-]+@navgurukul\.org)/g, '<a href="mailto:$1" style="color:var(--accent);text-decoration:none;font-weight:500">$1</a>');
  text = text.replace(/([a-zA-Z0-9._%+-]+@thesama\.in)/g, '<a href="mailto:$1" style="color:var(--accent);text-decoration:none;font-weight:500">$1</a>');
  text = text.replace(/([a-zA-Z0-9._%+-]+@samyarth\.org)/g, '<a href="mailto:$1" style="color:var(--accent);text-decoration:none;font-weight:500">$1</a>');
  return text;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  // Remove chips if still present
  const chips = document.getElementById('starter-chips');
  if (chips) chips.remove();

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || "Sorry, something went wrong. Please try again.";

    history.push({ role: 'assistant', content: reply });

    removeTyping();
    addMessage('bot', formatResponse(reply));
  } catch (err) {
    removeTyping();
    addMessage('bot', 'Something went wrong. Please check your connection and try again.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// Welcome message
addMessage('bot', "Hi 👋 I'm here to help you figure out the right person to reach out to, depending on what's going on. Tell me what's happening — no need to have it all figured out.");
renderChips();
</script>
</body>
</html>
